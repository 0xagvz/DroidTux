<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroidTux Sync</title>
    <style>
        :root {
            --bg: #2e3440;
            --card: #3b4252;
            --text: #eceff4;
            --accent: #88c0d0;
            --error: #bf616a;
            --success: #a3be8c;
            --log-bg: #1b1f27;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        p { color: #d8dee9; margin-top: 0.5rem; font-size: 0.9rem; }

        .status-card {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 12px;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        #status-text {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        #sub-status {
            font-size: 0.85rem;
            color: #e5e9f0;
        }

        .progress-container {
            background: #4c566a;
            height: 8px;
            border-radius: 4px;
            margin: 1.5rem 0;
            overflow: hidden;
        }

        #progress-bar {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .logs {
            background-color: var(--log-bg);
            border-radius: 8px;
            height: 150px;
            margin-top: 1.5rem;
            padding: 1rem;
            text-align: left;
            font-family: 'Monospace', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
            color: #d8dee9;
            border: 1px solid #434c5e;
            display: none;
        }

        .logs div { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 8px; }

        .btn-toggle-logs {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: underline;
        }

        .error-card {
            background: rgba(191, 97, 106, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4c566a; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- El logo se sirve desde el backend si se desea, aquí usamos un placeholder por ahora -->
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#88C0D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="#88C0D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="#88C0D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <h1>DROIDTUX SYNC</h1>
        <p>Tu Android, perfectamente integrado</p>

        <div class="status-card">
            <span id="status-text">Esperando conexión...</span>
            <span id="sub-status">Asegúrate de conectar el USB</span>

            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>

            <div id="error-box" class="error-card"></div>

            <button class="btn-toggle-logs" onclick="toggleLogs()">Ver detalles técnicos</button>
            <div id="logs" class="logs"></div>
        </div>
    </div>

    <script>
        const logsDiv = document.getElementById('logs');
        const statusText = document.getElementById('status-text');
        const subStatus = document.getElementById('sub-status');
        const progressBar = document.getElementById('progress-bar');
        const errorBox = document.getElementById('error-box');

        const ws = new WebSocket(`ws://${window.location.host}/ws`);

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'log') {
                const div = document.createElement('div');
                div.textContent = msg.data;
                logsDiv.appendChild(div);
                logsDiv.scrollTop = logsDiv.scrollHeight;
            } else if (msg.type === 'status') {
                statusText.textContent = msg.status;
                progressBar.style.width = `${msg.progress}%`;
                if (msg.progress === 100) {
                    statusText.style.color = '#a3be8c';
                    subStatus.textContent = 'Proceso finalizado con éxito';
                }
            } else if (msg.type === 'error') {
                errorBox.textContent = msg.message;
                errorBox.style.display = 'block';
                statusText.style.color = '#bf616a';
            }
        };

        function toggleLogs() {
            logsDiv.style.display = logsDiv.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
