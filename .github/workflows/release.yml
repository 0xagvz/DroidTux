name: Build and Release DroidTux

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    if: contains(github.event.head_commit.message, '[RELEASE]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.vars.outputs.version }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Version
        id: vars
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential zip rpm libarchive-tools zstd
          sudo gem install --no-document fpm

      - name: Build Bridge APK
        run: |
          chmod +x build_bridge.sh
          ./build_bridge.sh

      - name: Package DroidTux (DEB, RPM, Arch)
        run: |
          chmod +x package.sh
          ./package.sh ${{ steps.vars.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          name: Release v${{ steps.vars.outputs.version }}
          draft: false
          prerelease: false
          files: |
            droidtux-bridge-final.apk
            *.deb
            *.rpm
            *.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-apt-update:
    needs: build-and-release
    if: always() && !cancelled() && needs.build-and-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Repo Update
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          
          # Nombres de archivo generados por fpm
          DEB_FILE="droidtux_${VERSION}_amd64.deb"
          RPM_FILE="droidtux-${VERSION}-1.noarch.rpm"
          ARCH_FILE="droidtux-${VERSION}-1-any.pkg.tar.zst"
          
          DEB_URL="${BASE_URL}/${DEB_FILE}"
          RPM_URL="${BASE_URL}/${RPM_FILE}"
          ARCH_URL="${BASE_URL}/${ARCH_FILE}"
          
          echo "Target Version: $VERSION"
          echo "Checking artifacts..."
          
          sleep 20
          
          # Verificar los 3 archivos
          for URL in "$DEB_URL" "$RPM_URL" "$ARCH_URL"; do
            if ! curl --output /dev/null --silent --head --fail "$URL"; then
              echo "ERROR: Artifact not found at $URL"
              exit 1
            fi
          done

          echo "All artifacts found! Triggering update at InledGroup/apt..."
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.APT_REPO_TOKEN }}" \
            https://api.github.com/repos/InledGroup/apt/dispatches \
            -d "{\"event_type\": \"package_upload\", \"client_payload\": {
                  \"deb_url\": \"$DEB_URL\",
                  \"rpm_url\": \"$RPM_URL\",
                  \"arch_url\": \"$ARCH_URL\",
                  \"version\": \"$VERSION\"
                }}"
